services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: projectflow-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-projectflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectflow-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-projectflow}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      ENV: ${ENV:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://frontend}
      # Test credentials for seed data
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MANAGER_EMAIL: ${MANAGER_EMAIL}
      MANAGER_PASSWORD: ${MANAGER_PASSWORD}
      DEVELOPER_EMAIL: ${DEVELOPER_EMAIL}
      DEVELOPER_PASSWORD: ${DEVELOPER_PASSWORD}
      VIEWER_EMAIL: ${VIEWER_EMAIL}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD}
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: .docker/frontend.Dockerfile
      args:
        - NGINX_CONF=${NGINX_CONF:-.docker/nginx.conf}
    container_name: projectflow-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:8080/api}
      # Test credentials
      VITE_ADMIN_EMAIL: ${ADMIN_EMAIL}
      VITE_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      VITE_MANAGER_EMAIL: ${MANAGER_EMAIL}
      VITE_MANAGER_PASSWORD: ${MANAGER_PASSWORD}
      VITE_DEVELOPER_EMAIL: ${DEVELOPER_EMAIL}
      VITE_DEVELOPER_PASSWORD: ${DEVELOPER_PASSWORD}
      VITE_VIEWER_EMAIL: ${VIEWER_EMAIL}
      VITE_VIEWER_PASSWORD: ${VIEWER_PASSWORD}
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
